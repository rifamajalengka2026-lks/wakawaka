name: Deploy Frontend to AWS Amplify

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Validate AWS Credentials
        run: aws sts get-caller-identity

      - name: Validate Files
        run: |
          if [ ! -f frontend/index.html ] || [ ! -f frontend/app.js ] || [ ! -f amplify.yml ]; then
            echo "Error: File index.html, app.js, atau amplify.yml tidak ada!"
            exit 1
          fi

      - name: Check Amplify App Exists
        id: check_app
        run: |
          APP_ID=$(aws amplify list-apps --query "apps[?name=='lks-amplify-order-app'].appId" --output text)
          if [ -z "$APP_ID" ]; then
            echo "Error: Aplikasi Amplify tidak ditemukan!"
            exit 1
          fi
          echo "APP_ID=$APP_ID" >> $GITHUB_ENV

      - name: Trigger Amplify Build
        run: |
          JOB_ID=$(aws amplify start-job --app-id $APP_ID --branch-name master --job-type RELEASE --query 'jobSummary.jobId' --output text)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Monitor Deployment Status
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job --app-id $APP_ID --branch-name master --job-id $JOB_ID --query 'job.summary.status' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              APP_URL=$(aws amplify get-app --app-id $APP_ID --query 'app.defaultDomain' --output text)
              echo "APP_URL=https://master.$APP_URL" >> $GITHUB_ENV
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Deployment gagal!"; exit 1
            fi
            sleep 10
          done
          echo "Deployment timeout!"; exit 1

      - name: Generate Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: $APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  notify:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: always() && github.ref == 'refs/heads/master'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Send SNS Notification
        run: |
          if [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            STATUS="SUKSES ✅"
          else
            STATUS="GAGAL ❌"
          fi
          SNS_TOPIC_ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn, 'lks-sns-order-notifications')].TopicArn" --output text)
          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "LKS Amplify Deployment: $STATUS" \
            --message "Status: $STATUS
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Branch: ${{ github.ref_name }}
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
